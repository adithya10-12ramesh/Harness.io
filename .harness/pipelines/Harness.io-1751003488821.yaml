pipeline:
  identifier: Build_adithya10_12ramesh_Harness_io_1751003503138
  name: Build Harness.io
  orgIdentifier: default
  projectIdentifier: Harnessio
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1750330006102
        repoName: adithya10-12ramesh/Harness.io
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: true
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter
                  type: Run
                  spec:
                    command: |-
                      pip install flake8
                      flake8 .
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  type: Run
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                      python3 -m pip install -e .
              - step:
                  identifier: dockerbuild
                  name: docker_build
                  type: BuildAndPushDockerRegistry
                  spec:
                    caching: true
                    connectorRef: <+input>
                    repo: hello/world
                    tags:
                      - latest
              - step:
                  identifier: ssh_deploy
                  name: Deploy via SSH
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      APP_HOST: 13.201.4.222
                      APP_PORT: "3000"
                      APP_URL: http://13.201.4.222:3000
                    command: |-
                      echo "<+secrets.getValue(\"ssh_key_pem\")>" > key1.pem
                      chmod 400 key1.pem
                      ssh -o StrictHostKeyChecking=no -i key1.pem ubuntu@13.201.4.222 'bash -s' <<'ENDSSH'
                      echo "Connected to host!"
                      cd /home/ubuntu/my-app
                      git pull origin main
                      docker compose up -d --build
                      # Wait for containers to start
                      sleep 10
                      # Check if app is running and accessible
                      if curl -f http://13.201.4.222:3000/health > /dev/null 2>&1; then
                        echo "Application is running and accessible at http://13.201.4.222:3000"
                      else
                        echo "Warning: Application might not be accessible externally"
                        echo "Checking local status..."
                        docker ps
                        netstat -tuln | grep 3000 || echo "Port 3000 not found"
                      fi
                      ENDSSH
              - step:
                  identifier: health_check
                  name: Application Health Check
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      APP_HOST: 13.201.4.222
                      APP_PORT: "3000"
                      APP_URL: http://13.201.4.222:3000
                    command: |-
                      echo "Performing health check on deployed application..."
                      # Wait a bit more for app to fully start
                      sleep 15

                      # Try to reach the application
                      for i in {1..5}; do
                        if curl -f -m 10 http://13.201.4.222:3000/health; then
                          echo "✅ Health check passed - Application is accessible"
                          exit 0
                        elif curl -f -m 10 http://13.201.4.222:3000/; then
                          echo "✅ Application root endpoint is accessible"
                          exit 0
                        else
                          echo "⏳ Attempt $i/5 - Waiting for application to respond..."
                          sleep 10
                        fi
                      done

                      echo "❌ Health check failed - Application not accessible"
                      echo "Please check:"
                      echo "1. EC2 Security Group allows port 3000"
                      echo "2. Application binds to 0.0.0.0:3000 (not localhost:3000)"
                      echo "3. Docker container is running properly"
                      exit 1
          platform:
            arch: Amd64
            os: Linux
          runtime:
            type: Docker
            spec: {}
        type: CI
        delegateSelectors:
          - linux-amd64
