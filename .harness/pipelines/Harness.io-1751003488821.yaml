pipeline:
  identifier: Build_adithya10_12ramesh_Harness_io_1751003503138
  name: Build Harness.io
  orgIdentifier: default
  projectIdentifier: Harnessio
  variables:
    - name: APP_HOST
      type: String
      value: 13.201.4.222
    - name: APP_PORT
      type: String
      value: "3000"
    - name: APP_URL
      type: String
      value: http://13.201.4.222:3000
    - name: HOST
      type: String
      value: 13.201.4.222
    - name: SERVER_HOST
      type: String
      value: 13.201.4.222
  properties:
    ci:
      codebase:
        build: <+input>
        connectorRef: account.Github_OAuth_1750330006102
        repoName: adithya10-12ramesh/Harness.io
  stages:
    - stage:
        identifier: build
        name: build
        spec:
          caching:
            enabled: true
          cloneCodebase: true
          execution:
            steps:
              - step:
                  identifier: runlinter
                  name: run linter
                  type: Run
                  spec:
                    command: |-
                      pip install flake8
                      flake8 .
              - step:
                  identifier: setupvirtualenvironment
                  name: setup virtual environment
                  type: Run
                  spec:
                    command: |-
                      python3 -m venv .venv
                      . .venv/bin/activate
                      python3 -m pip install -r requirements.txt
                      python3 -m pip install -e .
              - step:
                  identifier: dockerbuild
                  name: docker_build
                  type: BuildAndPushDockerRegistry
                  spec:
                    caching: true
                    connectorRef: <+input>
                    repo: hello/world
                    tags:
                      - latest
                    buildArgs:
                      HOST: 0.0.0.0
                      PORT: "3000"
                      APP_HOST: 13.201.4.222
              - step:
                  identifier: ssh_deploy
                  name: Deploy via SSH
                  type: Run
                  spec:
                    shell: Bash
                    envVariables:
                      APP_HOST: 13.201.4.222
                      APP_PORT: "3000"
                      APP_URL: http://13.201.4.222:3000
                    command: |-
                      echo "<+secrets.getValue(\"ssh_key_pem\")>" > key1.pem
                      chmod 400 key1.pem
                      ssh -o StrictHostKeyChecking=no -i key1.pem ubuntu@13.201.4.222 'bash -s' <<'ENDSSH'
                      echo "Connected to host!"
                      cd /home/ubuntu/my-app
                      git pull origin main
                      docker compose up -d --build
                      # Wait for containers to start
                      sleep 10
                      # Check if app is running and accessible
                      if curl -f http://13.201.4.222:3000/health > /dev/null 2>&1; then
                        echo "Application is running and accessible at http://13.201.4.222:3000"
                      else
                        echo "Warning: Application might not be accessible externally"
                        echo "Checking local status..."
                        docker ps
                        netstat -tuln | grep 3000 || echo "Port 3000 not found"
                      fi
                      ENDSSH
              - step:
                  identifier: debug_connections
                  name: Debug Connection Attempts
                  type: Run
                  spec:
                    shell: Bash
                    command: |-
                      echo "=== DEBUGGING CONNECTION ISSUE ==="
                      echo "Pipeline variables:"
                      echo "APP_HOST: ${APP_HOST}"
                      echo "APP_URL: ${APP_URL}"
                      echo "HOST: ${HOST}"

                      echo "=== Environment variables ==="
                      env | grep -i host
                      env | grep -i url
                      env | grep -i port

                      echo "=== Testing connectivity ==="
                      ping -c 2 13.201.4.222

                      echo "=== Checking what's listening on EC2 ==="
                      ssh -o StrictHostKeyChecking=no -i key1.pem ubuntu@13.201.4.222 'netstat -tuln | grep 3000'

                      echo "=== Testing external access ==="
                      curl -v --connect-timeout 10 http://13.201.4.222:3000/ || echo "External connection failed"
          platform:
            arch: Amd64
            os: Linux
          runtime:
            type: Docker
            spec: {}
        type: CI
        delegateSelectors:
          - linux-amd64
